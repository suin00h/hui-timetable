<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f11; --surface:#1a1a1f; --border:#2a2a32;
  --text:#e8e8f0; --muted:#55556a;
  --accent:#5b6af0; --accent-dim:rgba(91,106,240,.12);
  --delete:#e05c5c; --now:#ff4d4d;
  --time-w:56px; --r:8px;
}
body.light {
  --bg:#f5f5f7; --surface:#ffffff; --border:#e0e0e8;
  --text:#1a1a2e; --muted:#8888a0;
  --accent:#4a58e0; --accent-dim:rgba(74,88,224,.1);
  --delete:#d94f4f; --now:#e03030;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 20px 48px;transition:background .2s,color .2s;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.title-input{font-size:1.6rem;font-weight:700;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.title-input:focus{border-bottom-color:var(--accent);}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.76rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{opacity:.85;color:#fff;}
.btn.danger{border-color:var(--delete);color:var(--delete);}
#syncStatus{font-size:.7rem;color:var(--muted);min-width:70px;text-align:right;}

/* ── SETTINGS ── */
.manage-panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;}
.manage-panel.open{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;}
.manage-panel h4{width:100%;font-size:.78rem;color:var(--muted);}
.cfg-item{display:flex;flex-direction:column;gap:4px;}
.cfg-item label{font-size:.68rem;color:var(--muted);}
.cfg-item input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:5px 8px;outline:none;width:90px;}
.cfg-item input:focus{border-color:var(--accent);}
.day-toggles{display:flex;gap:5px;flex-wrap:wrap;}
.day-tag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:.72rem;cursor:pointer;background:var(--bg);transition:all .12s;}
.day-tag.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.tip{font-size:.64rem;color:var(--muted);line-height:1.7;width:100%;}

/* ── TIMETABLE ── */
.tt-wrap{overflow-x:auto;}
.tt-outer{display:flex;min-width:400px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.tt-times{flex-shrink:0;width:var(--time-w);background:var(--surface);border-right:1px solid var(--border);}
.tt-times .corner{height:40px;border-bottom:1px solid var(--border);}
.tt-time-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--border);padding:4px;cursor:pointer;transition:background .12s;position:relative;}
.tt-time-cell:hover{background:var(--accent-dim);}
.tt-time-cell .p-num{font-size:.56rem;color:var(--muted);opacity:.55;}
.tt-time-cell .p-time{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);}
.tt-time-cell .p-hint{font-size:.68rem;font-weight:700;color:var(--accent);opacity:0;transition:opacity .12s;margin-top:2px;}
.tt-time-cell:hover .p-hint{opacity:1;}
.tt-days{display:flex;flex:1;}
.tt-day{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:80px;}
.tt-day:last-child{border-right:none;}
.tt-day-header{height:40px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:500;color:var(--muted);letter-spacing:.05em;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tt-day-header.today{color:var(--accent);font-weight:700;}
.click-layer{position:absolute;inset:0;cursor:pointer;transition:background .1s;z-index:1;}
.click-layer:hover{background:var(--accent-dim);}

/* ── BLOCK ── */
.tt-block{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 7px;cursor:pointer;pointer-events:all;transition:filter .15s,box-shadow .15s;text-align:center;overflow:hidden;position:absolute;z-index:2;}
.tt-block:hover{filter:brightness(1.14);box-shadow:0 4px 14px rgba(0,0,0,.4);}
.tt-block .b-name{font-size:.74rem;font-weight:700;line-height:1.2;}
.tt-block .b-sub{font-size:.6rem;opacity:.7;margin-top:2px;}
.tt-block .b-time{font-size:.56rem;opacity:.5;margin-top:2px;font-family:'DM Mono',monospace;}
.tt-block .b-del{position:absolute;top:3px;right:4px;font-size:.6rem;opacity:0;cursor:pointer;color:rgba(255,255,255,.85);transition:opacity .12s;z-index:3;}
.tt-block .b-plus{position:absolute;bottom:3px;right:4px;font-size:.72rem;font-weight:700;opacity:0;cursor:pointer;color:rgba(255,255,255,.9);transition:opacity .12s;z-index:3;background:rgba(255,255,255,.18);border-radius:4px;padding:0px 5px;}
.tt-block:hover .b-del,.tt-block:hover .b-plus{opacity:1;}
.tt-block .b-plus:hover{background:rgba(255,255,255,.32);}
.b-avs{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:3px;max-width:100%;}
.b-av{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.46rem;font-weight:700;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);flex-shrink:0;cursor:pointer;}

/* ── FIXED EVENT (solid fill) ── */
.tt-block.fixed-event{z-index:3;}
.tt-block.fixed-event .b-name{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.tt-block.fixed-event .b-sub{color:rgba(255,255,255,.8);}
.tt-block.fixed-event .b-time{color:rgba(255,255,255,.7);opacity:1;}
.tt-block.fixed-event .b-del{color:rgba(255,255,255,.9);}

/* ── SUB-INTERVAL DOTTED LINES ── */
.sub-line{position:absolute;left:0;right:0;height:0;border-top:1px dashed;pointer-events:none;z-index:1;opacity:.55;}

/* ── NOW LINE ── */
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--now);z-index:10;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--now);}

/* ── INTERN SIDE BARS ── */
.intern-bar{
  position:absolute;right:0;width:5px;
  border-radius:2px 0 0 2px;
  z-index:4;cursor:pointer;
  transition:width .15s,opacity .15s;
  opacity:.9;
}
.intern-bar:hover{width:10px;opacity:1;}
/* tooltip */
.intern-bar::after{
  content:attr(data-tip);
  position:absolute;right:100%;top:50%;transform:translateY(-50%);
  background:#1c1c24;border:1px solid var(--border);
  color:var(--text);font-size:.66rem;font-family:'Noto Sans KR',sans-serif;
  padding:4px 8px;border-radius:6px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;margin-right:6px;
  z-index:100;
}
.intern-bar:hover::after{opacity:1;}

/* ── ROSTER POPUP ── */
.roster-popup{display:none;position:fixed;z-index:200;background:#1c1c24;border:1px solid var(--border);border-radius:12px;padding:16px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:popIn .15s ease;}
.roster-popup.open{display:block;}
.roster-popup h4{font-size:.82rem;font-weight:600;margin-bottom:10px;}
.roster-list{list-style:none;}
.roster-list li{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.8rem;}
.roster-list li:last-child{border-bottom:none;}
.roster-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;}
.roster-close{display:block;margin-top:10px;width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.72rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.roster-close:hover{border-color:var(--accent);color:var(--accent);}

/* ── STUDENT STATUS PANEL ── */
.status-panel{margin-top:20px;}
.status-panel h3{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:12px;letter-spacing:.04em;display:flex;align-items:baseline;gap:7px;}
.status-panel h3 .count{font-size:.68rem;font-weight:400;color:var(--muted);}
.student-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.s-card{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  transition:all .2s;overflow:hidden;
}
.s-card.in-class{
  border-color:var(--accent);
  background:var(--accent-dim);
}
.s-card .s-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;}
.s-card .s-info{display:flex;flex-direction:column;gap:1px;min-width:0;}
.s-card .s-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-card .s-class{font-size:.62rem;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-card.in-class .s-class{color:var(--accent);}
.no-students{font-size:.75rem;color:var(--muted);}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:#1c1c24;border:1px solid var(--border);border-radius:14px;padding:26px;width:400px;max-width:94vw;animation:popIn .18s ease;max-height:90vh;overflow-y:auto;}
@keyframes popIn{from{transform:scale(.93);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h3{font-size:.95rem;font-weight:600;margin-bottom:16px;}
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:4px;}
.form-row input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.84rem;padding:8px 10px;outline:none;transition:border-color .15s;}
.form-row input:focus{border-color:var(--accent);}
.span-btns{display:flex;gap:5px;flex-wrap:wrap;}
.span-btn{flex:1;min-width:58px;padding:7px 4px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:.68rem;font-family:'DM Mono',monospace;cursor:pointer;transition:all .12s;text-align:center;line-height:1.5;}
.span-btn:hover{border-color:var(--accent);color:var(--accent);}
.span-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.color-grid{display:grid;grid-template-columns:repeat(8,26px);gap:5px;}
.color-swatch{width:26px;height:26px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;position:relative;}
.color-swatch:hover{transform:scale(1.14);}
.color-swatch.on{border-color:#fff;}
.color-swatch.editable::after{content:'✎';position:absolute;bottom:-1px;right:-1px;font-size:7px;background:rgba(0,0,0,.55);color:#fff;border-radius:2px;padding:0 2px;opacity:0;transition:opacity .1s;pointer-events:none;}
.color-swatch.editable:hover::after{opacity:1;}
/* hidden color picker anchor */
#palettePickerInput{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}

/* Student picker in modal */
.student-section{display:flex;flex-direction:column;gap:8px;}
/* Add new student row */
.new-student-row{display:flex;gap:6px;}
.new-student-row input{flex:1;}
.new-student-row .btn{flex-shrink:0;padding:0 12px;}
/* Existing student checklist */
.student-checklist{display:flex;flex-wrap:wrap;gap:5px;max-height:120px;overflow-y:auto;padding:2px;}
.sc-item{display:flex;align-items:center;gap:5px;padding:4px 9px 4px 6px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:all .12s;font-size:.74rem;user-select:none;}
.sc-item:hover{border-color:var(--accent);}
.sc-item.checked{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.sc-item .sc-av{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.46rem;font-weight:700;flex-shrink:0;}
.sc-item .sc-check{font-size:.6rem;opacity:0;transition:opacity .12s;}
.sc-item.checked .sc-check{opacity:1;}
.no-roster-hint{font-size:.7rem;color:var(--muted);}

.modal-btns{display:flex;gap:7px;margin-top:18px;}
.modal-btns .btn{flex:1;text-align:center;}

/* ── AUTH ── */
.lock-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.82rem;padding:5px 10px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.lock-btn:hover{border-color:var(--accent);color:var(--accent);}
.lock-btn.unlocked{border-color:#16a34a55;color:#16a34a;}
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;}
.auth-overlay.hidden{display:none;}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 16px 48px rgba(0,0,0,.6);animation:popIn .18s ease;}
.auth-box h3{font-size:1rem;font-weight:700;margin-bottom:6px;}
.auth-box p{font-size:.74rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.auth-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;padding:10px 12px;outline:none;transition:border-color .15s;font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;}
.auth-box input:focus{border-color:var(--accent);}
.auth-box input.error{border-color:#e05c5c;animation:shake .25s ease;}
.auth-btns{display:flex;gap:8px;margin-top:14px;}
.auth-btns .btn{flex:1;text-align:center;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* read-only mode: hide edit controls */
body.locked .btn-edit-only{display:none!important;}
body.locked .tt-block .b-del{display:none!important;}
body.locked .tt-block .b-plus{display:none!important;}
body.locked .click-layer{pointer-events:none!important;}
body.locked .tt-time-cell{pointer-events:none!important;cursor:default!important;}
body.locked .title-input{pointer-events:none!important;}
body.locked .manage-panel{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <input class="title-input" id="titleInput" value="26-1 시간표" size="12">
  <div class="controls">
    <span id="syncStatus"></span>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">☀ 라이트</button>
    <button id="lockBtn" class="lock-btn" onclick="handleLockClick()">🔒</button>
    <button class="btn btn-edit-only" onclick="toggleManage()">⚙ 설정</button>
    <button class="btn btn-edit-only" onclick="openRosterManager()">👥 수강생 관리</button>
  </div>
</div>

<!-- AUTH OVERLAY -->
<div class="auth-overlay hidden" id="authOverlay">
  <div class="auth-box">
    <h3 id="authTitle">🔓 수정 모드 잠금 해제</h3>
    <p id="authDesc">비밀번호를 입력하면 수정 권한이 활성화됩니다.<br>탭을 닫으면 자동으로 잠금됩니다.</p>
    <input type="password" id="authInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')submitAuth()">
    <div class="auth-btns">
      <button class="btn" type="button" onclick="closeAuthOverlay()">취소</button>
      <button class="btn primary" type="button" onclick="submitAuth()">확인</button>
    </div>
  </div>
</div>

<div class="manage-panel" id="managePanel">
  <h4>시간표 설정</h4>
  <div class="cfg-item"><label>시작 시간</label><input type="time" id="cfgStart" value="09:00" onchange="render()"></div>
  <div class="cfg-item"><label>교시 간격 (분)</label><input type="number" id="cfgInterval" value="90" min="30" max="240" style="width:70px" onchange="render()"></div>
  <div class="cfg-item"><label>교시 수</label><input type="number" id="cfgPeriods" value="6" min="1" max="16" style="width:60px" onchange="render()"></div>
  <div class="cfg-item"><label>요일</label><div class="day-toggles" id="dayToggles"></div></div>
  <div class="cfg-item">
    <label>30분 구분선</label>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.76rem;color:var(--text);">
      <input type="checkbox" id="cfgSubLines" onchange="S.subLines=this.checked;render()">
      표시
    </label>
  </div>
  <div class="cfg-item">
    <label>고정 일정</label>
    <button class="btn" type="button" onclick="openFixedEventMgr()" style="font-size:.72rem;padding:5px 10px;">📌 관리</button>
  </div>
  <div class="cfg-item" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">
    <label>비밀번호 변경</label>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <input type="password" id="cfgPwCurrent" placeholder="현재 비밀번호" style="font-size:.78rem;padding:6px 10px;">
      <input type="password" id="cfgPwNew" placeholder="새 비밀번호" style="font-size:.78rem;padding:6px 10px;">
      <input type="password" id="cfgPwConfirm" placeholder="새 비밀번호 확인" style="font-size:.78rem;padding:6px 10px;">
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn primary" type="button" onclick="changePassword()" style="font-size:.72rem;padding:5px 12px;">변경</button>
        <span id="cfgPwMsg" style="font-size:.7rem;color:var(--muted);"></span>
      </div>
    </div>
  </div>
  <p class="tip">💡 빈 칸 클릭 → 수업 추가 &nbsp;|&nbsp; 왼쪽 교시 라벨 클릭 → 요일 선택 추가 &nbsp;|&nbsp; 블록 클릭 → 편집<br>🎨 색상 팔레트: 색상 선택 시 <strong>우클릭</strong>으로 팔레트 색상 편집 가능</p>
</div>

<input type="color" id="palettePickerInput">

<div class="tt-wrap"><div class="tt-outer" id="ttOuter"></div></div>

<!-- STUDENT STATUS PANEL -->
<div class="status-panel">
  <h3>수강생 현황 <span class="count" id="rosterCount"></span></h3>
  <div class="student-cards" id="studentCards"></div>
</div>

<!-- ROSTER POPUP (block detail) -->
<div class="roster-popup" id="rosterPopup">
  <h4 id="rosterTitle">수강생</h4>
  <ul class="roster-list" id="rosterList"></ul>
  <button class="roster-close" onclick="closeRoster()">닫기</button>
</div>

<!-- FIXED EVENT MANAGER -->
<div class="modal-bg" id="fixedMgrBg">
  <div class="modal" style="width:460px;">
    <h3 id="fixedMgrTitle">고정 일정 추가</h3>
    <div class="form-row"><label>일정명</label><input type="text" id="fFixedName" placeholder="예: 주간 랩미팅"></div>
    <div class="form-row">
      <label>요일 (복수 선택)</label>
      <div class="day-toggles" id="fixedDayPicker"></div>
    </div>
    <div class="form-row">
      <label>시간</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="time" id="fFixedStart" value="10:00" style="width:130px;min-width:130px;">
        <span style="color:var(--muted)">~</span>
        <input type="time" id="fFixedEnd" value="11:00" style="width:130px;min-width:130px;">
      </div>
    </div>
    <div class="form-row"><label>색상</label><div class="color-grid" id="fixedColorGrid"></div></div>
    <div class="modal-btns" style="margin-bottom:16px;">
      <button class="btn danger" id="fFixedDelBtn" type="button" onclick="deleteFixedEvent()" style="display:none;">삭제</button>
      <button class="btn" type="button" onclick="resetFixedForm()">초기화</button>

<script>
const DAYS_ALL=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let COLORS=['#5b6af0','#7c3aed','#db2777','#e05c5c','#ea7a2c','#d4a017','#16a34a','#0891b2',
            '#0d7490','#6b7280','#a16207','#7f5539','#b5179e','#3a86ff','#48cae4','#80b918',
            '#f72585','#4cc9f0','#43aa8b','#f8961e','#277da1','#c77dff','#90be6d','#e63946'];
const AV_COLORS=['#5b6af0','#16a34a','#db2777','#ea7a2c','#0891b2','#7c3aed','#d4a017','#e05c5c'];

let S={
  title:'26-1 시간표', startTime:'09:00', interval:90, periods:6,
  days:['Mon','Tue','Wed','Thu','Fri'],
  blocks:[],   // {id,day,period,span,name,sub,color,students:[]}
  roster:[],   // {name,intern,color,schedule:[{day,start,end}]}
  fixedEvents:[], // {id,days:[],startTime,endTime,name,color}
  subLines:false, // 30min sub-interval dotted lines
  palette:null,   // custom color palette (16 hex strings), null = use default
};

// roster migration: old format was string[], new is object[]
function migrateRoster(){
  if(!S.roster)S.roster=[];
  S.roster=S.roster.map(r=> typeof r==='string' ? {name:r,intern:false,color:'#ff9f43',schedule:[]} : r);
}

// helpers for roster lookup
function rosterEntry(name){return S.roster.find(r=>r.name===name)||{name,intern:false,color:'#ff9f43',schedule:[]};}
function isIntern(name){const r=S.roster.find(x=>x.name===name);return r&&r.intern;}

let mCtx=null, mDay=null, mColor=COLORS[0], mSpan=1, mStudents=[];
const ROW_H=64;

// ── helpers ──────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function addMins(t,m){const[h,mm]=t.split(':').map(Number),tot=h*60+mm+m;return`${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;}
function pStart(p){return addMins(S.startTime,(p-1)*S.interval);}
function pEnd(p){return addMins(S.startTime,p*S.interval);}
function syncState(){
  S.startTime=document.getElementById('cfgStart').value;
  S.interval=Math.max(30,parseInt(document.getElementById('cfgInterval').value)||90);
  S.periods=Math.max(1,parseInt(document.getElementById('cfgPeriods').value)||6);
  S.subLines=document.getElementById('cfgSubLines').checked;
}
function initials(n){return n.trim().slice(0,2).toUpperCase();}
function avColor(n){
  const r=S.roster.find(x=>x.name===n);
  if(r&&r.color&&!r.intern)return r.color; // use custom color for non-interns too
  if(r&&r.intern)return r.color;
  let h=0;for(let c of n)h=(h+c.charCodeAt(0))%AV_COLORS.length;return AV_COLORS[h];
}

// ── current class detection ───────────────────────────────────────
function getCurrentBlocks(){
  const now=new Date();
  const todayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const [sh,sm]=S.startTime.split(':').map(Number);
  const nowMins=now.getHours()*60+now.getMinutes();
  return S.blocks.filter(b=>{
    if(b.day!==todayName)return false;
    const startMins=sh*60+sm+(b.period-1)*S.interval;
    const endMins=startMins+b.span*S.interval;
    return nowMins>=startMins&&nowMins<endMins;
  });
}

// ── day toggles ──────────────────────────────────────────────────
function buildDayToggles(){
  const el=document.getElementById('dayToggles');el.innerHTML='';
  DAYS_ALL.forEach(d=>{
    const t=document.createElement('div');
    t.className='day-tag'+(S.days.includes(d)?' on':'');
    t.textContent=d;
    t.onclick=()=>{
      if(S.days.includes(d)){if(S.days.length===1)return;S.days=S.days.filter(x=>x!==d);}
      else S.days=DAYS_ALL.filter(x=>S.days.includes(x)||x===d);
      buildDayToggles();render();
    };
    el.appendChild(t);
  });
}

// ── lane assignment (right-aligned: longer blocks left, shorter right) ───
function assignLanes(blocks){
  // Sort by span desc, then period asc — longer blocks claim left lanes first
  const sorted=[...blocks].sort((a,b)=> b.span-a.span || a.period-b.period);
  const result={},laneEnds=[];

  sorted.forEach(b=>{
    const bEnd=b.period+b.span-1;
    let chosen=-1;
    for(let i=0;i<laneEnds.length;i++){
      if(laneEnds[i]<b.period){chosen=i;break;}
    }
    if(chosen===-1){chosen=laneEnds.length;laneEnds.push(0);}
    laneEnds[chosen]=bEnd;
    result[b.id]={lane:chosen,totalLanes:0};
  });

  // Compute totalLanes for each block = max lane index among overlapping blocks + 1
  sorted.forEach(b=>{
    const bEnd=b.period+b.span-1;let maxL=result[b.id].lane;
    sorted.forEach(o=>{
      if(o.id===b.id)return;
      const oEnd=o.period+o.span-1;
      if(o.period<=bEnd&&oEnd>=b.period)maxL=Math.max(maxL,result[o.id].lane);
    });
    result[b.id].totalLanes=maxL+1;
  });
  return result;
}

// ── now-line ─────────────────────────────────────────────────────
function getNowOffsetPx(){
  const now=new Date();
  const[sh,sm]=S.startTime.split(':').map(Number);
  const startMins=sh*60+sm,nowMins=now.getHours()*60+now.getMinutes();
  const diff=nowMins-startMins;
  if(diff<0||diff>S.periods*S.interval)return null;
  return(diff/S.interval)*ROW_H;
}
function updateNowLine(){
  const px=getNowOffsetPx();
  document.querySelectorAll('.now-line').forEach(el=>{
    el.style.display=px===null?'none':'block';
    if(px!==null)el.style.top=px+'px';
  });
  renderStatusPanel();
}

// ── render ───────────────────────────────────────────────────────
function render(){
  syncState();
  const outer=document.getElementById('ttOuter');
  outer.innerHTML='';
  const todayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];

  // Time column
  const timesCol=document.createElement('div');
  timesCol.className='tt-times';
  timesCol.appendChild(Object.assign(document.createElement('div'),{className:'corner'}));
  for(let p=1;p<=S.periods;p++){
    const tc=document.createElement('div');
    tc.className='tt-time-cell';tc.style.height=ROW_H+'px';tc.title=`${p}교시 기준 수업 추가`;
    tc.innerHTML=`<span class="p-num">${p}교시</span><span class="p-time">${pStart(p)}</span><span class="p-hint">+</span>`;
    tc.onclick=()=>openAddFromTime(p);timesCol.appendChild(tc);
  }
  outer.appendChild(timesCol);

  // Day columns
  const daysWrap=document.createElement('div');daysWrap.className='tt-days';
  S.days.forEach(day=>{
    const dayCol=document.createElement('div');dayCol.className='tt-day';
    const hdr=document.createElement('div');
    hdr.className='tt-day-header'+(day===todayName?' today':'');
    hdr.textContent=day;dayCol.appendChild(hdr);

    const dayBlocks=S.blocks.filter(b=>b.day===day);
    const lanes=assignLanes(dayBlocks);
    const swallowed=new Set();
    dayBlocks.forEach(b=>{for(let i=1;i<b.span;i++)swallowed.add(b.period+i);});

    const wrap=document.createElement('div');
    wrap.style.cssText=`position:relative;flex:1;height:${S.periods*ROW_H}px;`;

    // Grid lines
    for(let p=1;p<=S.periods;p++){
      const l=document.createElement('div');
      l.style.cssText=`position:absolute;left:0;right:0;top:${p*ROW_H}px;height:1px;background:var(--border);pointer-events:none;`;
      wrap.appendChild(l);
    }

    // Sub-interval dotted lines (30 min subdivisions)
    if(S.subLines && S.interval>30){
      const subStep=30; // always 30min subdivisions
      const steps=S.interval/subStep;
      for(let p=0;p<S.periods;p++){
        for(let s=1;s<steps;s++){
          const topPx=(p + s/steps)*ROW_H;
          const sl=document.createElement('div');
          sl.className='sub-line';
          sl.style.cssText=`top:${topPx}px;border-color:var(--border);`;
          wrap.appendChild(sl);
        }
      }
    }
    // Click zones
    for(let p=1;p<=S.periods;p++){
      if(!swallowed.has(p)&&!dayBlocks.some(b=>b.period===p)){
        const cz=document.createElement('div');
        cz.className='click-layer';cz.style.cssText=`top:${(p-1)*ROW_H}px;height:${ROW_H}px;`;
        cz.onclick=()=>openAdd(day,p);wrap.appendChild(cz);
      }
    }

    // ── Intern bar zone ───────────────────────────────────────────
    // Reserve right edge for intern bars. Blocks stay in the left portion.
    const hasInternBars = S.roster.some(r=>r.intern&&(r.schedule||[]).some(sc=>sc.day===day));
    const BAR_ZONE = hasInternBars ? 9 : 0; // px reserved on right edge

    // Blocks
    dayBlocks.forEach(b=>{
      const{lane,totalLanes}=lanes[b.id];
      const GAP=3,actualSpan=Math.min(b.span,S.periods-b.period+1);
      const bEnd=b.period+actualSpan-1;

      let minLanesNeeded=1;
      for(let p=b.period;p<=bEnd;p++){
        const count=dayBlocks.filter(o=>{
          const oEnd=o.period+Math.min(o.span,S.periods-o.period+1)-1;
          return o.period<=p&&oEnd>=p;
        }).length;
        minLanesNeeded=Math.max(minLanesNeeded,count);
      }
      const effectiveLanes=minLanesNeeded;
      const effectiveLane=Math.min(lane,effectiveLanes-1);

      // Block lives in (0% .. 100%-BAR_ZONE px) horizontally
      // Use calc to subtract bar zone from the available width
      const colWPct=100/effectiveLanes;
      const leftExpr=`calc(${effectiveLane*colWPct}% + ${GAP}px)`;
      // width = colWPct% of (100%-BAR_ZONE) - gaps, simplified:
      // available = 100% - BAR_ZONE, each lane = available/effectiveLanes
      const widthExpr=`calc(${colWPct}% - ${BAR_ZONE/effectiveLanes + GAP*2}px)`;

      const bEl=document.createElement('div');bEl.className='tt-block';
      const heightPx=actualSpan*ROW_H-GAP*2;
      const topPx=(b.period-1)*ROW_H+GAP;
      bEl.style.cssText=`top:${topPx}px;height:${heightPx}px;left:${leftExpr};width:${widthExpr};background:${b.color}1e;border:1.5px solid ${b.color};color:${b.color};`;

      // ── Adaptive display based on effective dimensions ────────────
      const isNarrow = effectiveLanes >= 3;
      const isMid    = effectiveLanes === 2;

      const isShort  = heightPx < ROW_H * 1.2;
      const isTall   = heightPx >= ROW_H * 1.8;  // lowered threshold: span>=2 qualifies

      const nameFontSize = isNarrow ? '.62rem' : isMid ? '.68rem' : '.74rem';
      const nameMaxLen   = isNarrow ? 5 : isMid ? 8 : 999;
      const rawName = b.name;
      const dispName = rawName.length > nameMaxLen ? rawName.slice(0,nameMaxLen)+'…' : rawName;

      // Show time only when no overlap at any period in span AND span>=2
      const showTime = effectiveLanes === 1 && actualSpan >= 2;

      // Avatar count
      let maxAv;
      if(isNarrow)   maxAv = isShort ? 0 : 1;
      else if(isMid) maxAv = isShort ? 1 : 2;
      else           maxAv = isShort ? 2 : isTall ? 6 : 4;

      const students=b.students||[];
      const shown=students.slice(0,maxAv);
      const extra=students.length-shown.length;
      let avsHtml='';
      if(shown.length>0||extra>0){
        avsHtml='<div class="b-avs">';
        shown.forEach(s=>{avsHtml+=`<div class="b-av" style="background:${avColor(s)}" onclick="showRoster('${b.id}',event)" title="${s}">${initials(s)}</div>`;});
        if(extra>0)avsHtml+=`<div class="b-av" style="background:rgba(255,255,255,.15);font-size:.5rem">+${extra}</div>`;
        avsHtml+='</div>';
      }

      bEl.innerHTML=`
        <div class="b-name" style="font-size:${nameFontSize}">${dispName}</div>
        ${(!isNarrow&&b.sub)?`<div class="b-sub">${b.sub}</div>`:''}
        ${showTime?`<div class="b-time">${pStart(b.period)} – ${pEnd(b.period+actualSpan-1)}</div>`:''}
        ${avsHtml}
        <span class="b-del" onclick="removeBlock('${b.id}',event)">✕</span>
        <span class="b-plus" onclick="openAdd('${day}',${b.period},event)">+</span>
      `;
      bEl.onclick=e=>{
        const cl=e.target.classList;
        if(!cl.contains('b-del')&&!cl.contains('b-plus')&&!cl.contains('b-av'))openEdit(b.id);
      };
      wrap.appendChild(bEl);
    });

    // Fixed events — solid fill, rendered behind normal blocks
    (S.fixedEvents||[]).filter(fe=>fe.days.includes(day)).forEach(fe=>{
      const toMins=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
      const[sh,sm]=S.startTime.split(':').map(Number);
      const totalMins=S.periods*S.interval;
      const startOff=toMins(fe.startTime)-(sh*60+sm);
      const endOff=toMins(fe.endTime)-(sh*60+sm);
      if(endOff<=0||startOff>=totalMins)return;
      const cs=Math.max(0,startOff), ce=Math.min(totalMins,endOff);
      const GAP=3;
      const hasIntern=S.roster.some(r=>r.intern&&(r.schedule||[]).some(sc=>sc.day===day));
      const bz=hasIntern?9:0;
      const topPx=(cs/S.interval)*ROW_H+GAP;
      const heightPx=((ce-cs)/S.interval)*ROW_H-GAP*2;
      if(heightPx<4)return;
      const fel=document.createElement('div');
      fel.className='tt-block fixed-event';
      fel.style.cssText=`top:${topPx}px;height:${heightPx}px;left:${GAP}px;width:calc(100% - ${bz+GAP*2}px);background:${fe.color};border:none;color:#fff;z-index:1;opacity:.92;`;
      const durationMins=ce-cs;
      const timeStr=`${fe.startTime} – ${fe.endTime}`;
      fel.innerHTML=`
        <div class="b-name" style="font-size:.72rem">${fe.name}</div>
        ${durationMins>=S.interval?`<div class="b-time">${timeStr}</div>`:''}
        <span class="b-del" onclick="removeFixedEvent('${fe.id}',event)">✕</span>
      `;
      fel.onclick=e=>{if(!e.target.classList.contains('b-del')&&isUnlocked())openFixedEventMgr();};
      wrap.appendChild(fel);
    });

    // Now line (today only)
    if(day===todayName){
      const nl=document.createElement('div');nl.className='now-line';
      const px=getNowOffsetPx();
      nl.style.display=px===null?'none':'block';
      nl.style.top=(px||0)+'px';wrap.appendChild(nl);
    }

    // Intern side bars — all overlap at right:0, 5px wide
    const BAR_W=5;
    S.roster.filter(r=>r.intern&&r.schedule&&r.schedule.length>0).forEach(r=>{
      r.schedule.filter(sc=>sc.day===day).forEach(sc=>{
        const toMins=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
        const[sh,sm]=S.startTime.split(':').map(Number);
        const totalMins=S.periods*S.interval;
        const startOff=toMins(sc.start)-(sh*60+sm);
        const endOff=toMins(sc.end)-(sh*60+sm);
        if(endOff<=0||startOff>=totalMins)return;
        const clampedStart=Math.max(0,startOff);
        const clampedEnd=Math.min(totalMins,endOff);
        const topPx=(clampedStart/S.interval)*ROW_H;
        const heightPx=((clampedEnd-clampedStart)/S.interval)*ROW_H;
        if(heightPx<2)return;
        const bar=document.createElement('div');
        bar.className='intern-bar';
        bar.style.cssText=`top:${topPx}px;height:${heightPx}px;right:0;width:${BAR_W}px;background:${r.color};`;
        bar.dataset.tip=`${r.name}  ${sc.start}–${sc.end}`;
        wrap.appendChild(bar);
      });
    });

    dayCol.appendChild(wrap);daysWrap.appendChild(dayCol);
  });
  outer.appendChild(daysWrap);
  renderStatusPanel();
}

// ── status panel ─────────────────────────────────────────────────
function renderStatusPanel(){
  const el=document.getElementById('studentCards');el.innerHTML='';
  const countEl=document.getElementById('rosterCount');
  if(S.roster.length===0){
    el.innerHTML='<span class="no-students">수강생을 등록하면 현황이 표시됩니다</span>';
    if(countEl)countEl.textContent='';return;
  }
  if(countEl)countEl.textContent=`총 ${S.roster.length}명`;
  const currentBlocks=getCurrentBlocks();
  const todayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
  const nowMins=new Date().getHours()*60+new Date().getMinutes();

  S.roster.forEach(r=>{
    const name=typeof r==='string'?r:r.name;
    const intern=r&&r.intern;
    const card=document.createElement('div');

    if(intern){
      // Check if intern is currently in their own schedule
      const toMins=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
      const activeSched=(r.schedule||[]).find(sc=>
        sc.day===todayName&&toMins(sc.start)<=nowMins&&nowMins<toMins(sc.end)
      );
      card.className='s-card'+(activeSched?' in-class':'');
      if(activeSched)card.style.borderColor=r.color;
      const statusText=activeSched?`타교 수업 중 (${activeSched.start}–${activeSched.end})`:'외부 수업 없음';
      card.innerHTML=`
        <div class="s-av" style="background:${r.color};color:#fff;border-radius:4px;">${initials(name)}</div>
        <div class="s-info">
          <div class="s-name" style="display:flex;align-items:center;gap:5px;">${name}<span style="font-size:.55rem;padding:1px 5px;border-radius:8px;background:${r.color}33;color:${r.color};border:1px solid ${r.color}55;">인턴</span></div>
          <div class="s-class" style="${activeSched?'color:'+r.color:''}">${statusText}</div>
        </div>`;
    } else {
      const attending=currentBlocks.filter(b=>(b.students||[]).includes(name));

// ── student checklist (modal) ────────────────────────────────────
function buildStudentChecklist(){
  const el=document.getElementById('studentChecklist');el.innerHTML='';
  const nonInterns=S.roster.filter(r=>r&&!r.intern);
  if(nonInterns.length===0){
    el.innerHTML='<span class="no-roster-hint">아직 수강생이 없어요. 아래에서 추가하세요.</span>';return;
  }
  nonInterns.forEach(r=>{
    const name=typeof r==='string'?r:r.name;
    const checked=mStudents.includes(name);
    const item=document.createElement('div');
    item.className='sc-item'+(checked?' checked':'');
    item.innerHTML=`<div class="sc-av" style="background:${avColor(name)};color:#fff;">${initials(name)}</div><span>${name}</span><span class="sc-check">✓</span>`;
    item.onclick=()=>{
      if(mStudents.includes(name))mStudents=mStudents.filter(s=>s!==name);
      else mStudents.push(name);
      buildStudentChecklist();
    };
    el.appendChild(item);
  });
}

// Add new student from modal (also adds to global roster as non-intern)
function addNewStudent(){
  const input=document.getElementById('fNewStudent');
  const name=input.value.trim();if(!name)return;
  if(!S.roster.find(r=>(r.name||r)===name))

  input.value='';

function saveRosterEntry(){
  const name=document.getElementById('fRosterNew').value.trim();
  if(!name)return;
  const isInternCheck=document.getElementById('fRosterIsIntern').checked;
  if(rosterEditName){
    const r=S.roster.find(x=>x.name===rosterEditName);
    if(r){
      r.intern=isInternCheck;
      r.color=rosterColor;
      r.schedule=isInternCheck?[...newInternScheds]:[];
    }
  } else {
    if(S.roster.find(r=>r.name===name)){alert('이미 등록된 이름이에요.');return;}
    S.roster.push({name,intern:isInternCheck,color:rosterColor,schedule:isInternCheck?[...newInternScheds]:[]});
  }
  scheduleSave();resetRosterForm();render();
}

function deleteEditingRoster(){
  if(!rosterEditName)return;
  S.roster=S.roster.filter(r=>r.name!==rosterEditName);
  S.blocks.forEach(b=>{b.students=(b.students||[]).filter(s=>s!==rosterEditName);});
  scheduleSave();resetRosterForm();render();
}

function buildInternDayPicker(){
  const el=document.getElementById('internDayPicker');el.innerHTML='';
  S.days.forEach(d=>{
    const t=document.createElement('div');
    t.className='day-tag'+(d===internDaySelected?' on':'');

function renderInternSchedList(){

  newInternScheds.forEach((sc,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;font-size:.76rem;';

function addInternSched(){
  const start=document.getElementById('fInternStart').value;
  const end=document.getElementById('fInternEnd').value;
  if(!start||!end||start>=end){alert('시간을 올바르게 입력해주세요.');return;}
  newInternScheds.push({day:internDaySelected,start,end});
  renderInternSchedList();
}
function removeNewInternSched(i){newInternScheds.splice(i,1);renderInternSchedList();}

function buildRosterMgrList(){
  const el=document.getElementById('rosterMgrList');el.innerHTML='';
  if(S.roster.length===0){el.innerHTML='<span class="no-roster-hint">등록된 인원이 없어요.</span>';return;}
  S.roster.forEach(r=>{
    const isEditing=rosterEditName===r.name;
    const isExpanded=rosterInternExpanded.has(r.name);
    const item=document.createElement('div');
    item.style.cssText=`border-radius:10px;border:1px solid ${isEditing?'var(--accent)':'var(--border)'};background:${isEditing?'var(--accent-dim)':'var(--surface)'};margin-bottom:4px;overflow:hidden;transition:all .12s;`;

    const colorDot=r.intern
      ? `<div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0;"></div>`
      : `<div style="width:10px;height:10px;border-radius:50%;background:${avColor(r.name)};flex-shrink:0;"></div>`;
    const nameText=`<span style="font-size:.76rem;font-weight:600;" title="${r.name}">${initials(r.name)}</span>`;
    const spacer='<span style="flex:1;"></span>';
    const badge=r.intern?`<span style="font-size:.6rem;padding:1px 5px;border-radius:8px;background:${r.color}33;color:${r.color};border:1px solid ${r.color}55;flex-shrink:0;">인턴</span>`:'';

    // intern toggle arrow
    const schedCount=r.intern&&r.schedule?.length>0?r.schedule.length:0;
    const toggleBtn=schedCount>0
      ? `<span style="font-size:.62rem;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;" onclick="toggleInternSched('${r.name}',event)">${isExpanded?'▲ 접기':`▼ ${schedCount}개 일정`}</span>`
      : '';
    const editBtn=`<span style="font-size:.62rem;opacity:.45;padding:2px 6px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;">편집</span>`;

    const header=document.createElement('div');
    header.style.cssText='display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;';
    header.innerHTML=`${colorDot}${nameText}${badge}${toggleBtn}${spacer}${editBtn}`;
    header.onclick=(e)=>{
      if(e.target.closest('[onclick*="toggleInternSched"]'))return;
      loadRosterToForm(r);
    };
    item.appendChild(header);

    // expanded schedule rows
    if(r.intern && isExpanded && r.schedule?.length>0){
      const schedWrap=document.createElement('div');
      schedWrap.style.cssText='padding:0 10px 8px 44px;display:flex;flex-direction:column;gap:3px;';
      r.schedule.forEach(sc=>{
        const row=document.createElement('div');
        row.style.cssText='font-size:.68rem;color:var(--muted);display:flex;gap:6px;';
        row.innerHTML=`<span style="background:var(--accent-dim);border:1px solid var(--border);padding:1px 7px;border-radius:10px;">${sc.day} ${sc.start}–${sc.end}</span>`;
        schedWrap.appendChild(row);
      });
      item.appendChild(schedWrap);
    }
    el.appendChild(item);
  });
}

function toggleInternSched(name,e){
  e.stopPropagation();
  if(rosterInternExpanded.has(name))rosterInternExpanded.delete(name);
  else rosterInternExpanded.add(name);
  buildRosterMgrList();
}

function buildSpanBtns(startP){
  const el=document.getElementById('spanBtns');el.innerHTML='';

  for(let s=1;s<=max;s++){
    const endP=startP+s-1;
    const btn=document.createElement('button');btn.type='button';
    btn.className='span-btn'+(s===mSpan?' on':'');
    btn.innerHTML=s===1?`<strong>${startP}교시</strong><br><span>${pStart(startP)}</span>`:`<strong>${startP}–${endP}교시</strong><br><span>${pStart(startP)}–${pEnd(endP)}</span>`;
    btn.onclick=()=>{mSpan=s;buildSpanBtns(startP);};el.appendChild(btn);
  }
}

// ── cloud sync ───────────────────────────────────────────────────
const API_URL='https://hui-timetable.vercel.app/api/data';
let saveTimer=null;

async function saveToCloud(){
  try{await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)});}
  catch(e){console.warn('save failed',e);}
}
async function loadFromCloud(){
  showSync('불러오는 중…');
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(data&&data.blocks){
      Object.assign(S,data);
      if(!S.roster)S.roster=[];
      if(!S.fixedEvents)S.fixedEvents=[];
      if(S.palette&&S.palette.length===24)COLORS=[...S.palette];
      migrateRoster();
      document.getElementById('titleInput').value=S.title;
      document.getElementById('cfgStart').value=S.startTime;
      document.getElementById('cfgInterval').value=S.interval;
      document.getElementById('cfgPeriods').value=S.periods;
    }
    showSync('✓ 동기화됨',2000);
  }catch(e){showSync('⚠ 실패',3000);}
}
function scheduleSave(){
  clearTimeout(saveTimer);showSync('저장 중…');
  saveTimer=setTimeout(async()=>{await saveToCloud();showSync('✓ 저장됨',2000);},800);
}
function showSync(msg,clear){
  const el=document.getElementById('syncStatus');if(el)el.textContent=msg;
  if(clear)setTimeout(()=>{if(el)el.textContent='';},clear);
}

function makeSwatches(el,selectedColor,onSelect,editable=false){
  el.innerHTML='';
  COLORS.forEach((c,idx)=>{
    const s=document.createElement('div');
    s.className='color-swatch'+(c===selectedColor?' on':'')+(editable?' editable':'');
    s.style.background=c;
    s.onclick=()=>{onSelect(c);};
    if(editable){
      s.oncontextmenu=(e)=>{
        e.preventDefault();
        editPaletteColor(idx,c,()=>{
          // rebuild whichever grid was right-clicked
          s.style.background=COLORS[idx];
          el.querySelectorAll('.color-swatch').forEach((sw,i)=>sw.style.background=COLORS[i]);
        });
      };
    }
    el.appendChild(s);
  });
}

  const name=document.getElementById('fFixedName').value.trim();
  if(!name){document.getElementById('fFixedName').focus();return;}
  if(fixedDaysSelected.length===0){alert('요일을 선택해주세요.');return;}
  const start=document.getElementById('fFixedStart').value;
  const end=document.getElementById('fFixedEnd').value;
  if(!start||!end||start>=end){alert('시간을 올바르게 입력해주세요.');return;}
  if(!S.fixedEvents)S.fixedEvents=[];
  if(fixedEditId){
    const fe=S.fixedEvents.find(x=>x.id===fixedEditId);
    if(fe){fe.name=name;fe.days=[...fixedDaysSelected];fe.startTime=start;fe.endTime=end;fe.color=fixedColor;}
  } else {
    S.fixedEvents.push({id:uid(),days:[...fixedDaysSelected],startTime:start,endTime:end,name,color:fixedColor});
  }
  resetFixedForm();buildFixedEventList();render();
}

function deleteFixedEvent(){
  if(!fixedEditId)return;
  S.fixedEvents=(S.fixedEvents||[]).filter(fe=>fe.id!==fixedEditId);
  resetFixedForm();buildFixedEventList();render();
}

function removeFixedEvent(id,e){
  if(!isUnlocked())return;
  if(e)e.stopPropagation();
  S.fixedEvents=(S.fixedEvents||[]).filter(fe=>fe.id!==id);
  buildFixedEventList();render();
}

// ── auth ──────────────────────────────────────────────────────────
const PW_HASH='6196735bccfab99b6ce6eaf4e375160b39926de2fcfcf1121c97a29ae3166fca'; // default: lab2026!
// To change password: open browser console and run setPwHash('newpassword')

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getStoredHash(){
  // Priority: S.pwHash (cloud-saved) > sessionStorage override > hardcoded default
  if(S.pwHash)return S.pwHash;
  try{return sessionStorage.getItem('tt_pw_hash')||PW_HASH;}catch(e){return PW_HASH;}
}

function isUnlocked(){
  try{return sessionStorage.getItem('tt_auth')==='1';}catch(e){return false;}
}

function applyLockState(){
  const unlocked=isUnlocked();
  document.body.classList.toggle('locked',!unlocked);
  const btn=document.getElementById('lockBtn');
  if(btn){btn.textContent=unlocked?'🔓':'🔒';btn.classList.toggle('unlocked',unlocked);}
}

function handleLockClick(){
  if(isUnlocked()){
    // lock
    try{sessionStorage.removeItem('tt_auth');}catch(e){}
    applyLockState();
  } else {
    openAuthOverlay();
  }
}

function openAuthOverlay(){
  document.getElementById('authOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('authInput').focus(),40);
}
function closeAuthOverlay(){
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('authInput').value='';
  document.getElementById('authInput').classList.remove('error');
}

async function submitAuth(){
  const val=document.getElementById('authInput').value;
  const hash=await sha256(val);
  const stored=getStoredHash();
  if(hash===stored){
    try{sessionStorage.setItem('tt_auth','1');}catch(e){}
    closeAuthOverlay();
    applyLockState();
  } else {
    const inp=document.getElementById('authInput');
    inp.classList.add('error');
    inp.value='';
    setTimeout(()=>inp.classList.remove('error'),400);
    inp.focus();
  }
}

// console helper to change password
window.setPwHash=async function(newPw){
  const h=await sha256(newPw);
  try{sessionStorage.setItem('tt_pw_hash',h);}catch(e){}
  console.log('새 비밀번호 해시:', h);
  console.log('이 값을 코드의 PW_HASH 상수에 붙여넣으면 영구 변경됩니다.');
};

async function changePassword(){
  const cur=document.getElementById('cfgPwCurrent').value;
  const nw=document.getElementById('cfgPwNew').value;
  const cf=document.getElementById('cfgPwConfirm').value;
  const msg=document.getElementById('cfgPwMsg');
  const setMsg=(t,ok)=>{msg.textContent=t;msg.style.color=ok?'#16a34a':'#e05c5c';setTimeout(()=>msg.textContent='',3000);};

  if(!cur||!nw||!cf){setMsg('모든 칸을 입력해주세요.');return;}
  if(nw!==cf){setMsg('새 비밀번호가 일치하지 않아요.');return;}
  if(nw.length<4){setMsg('4자 이상으로 설정해주세요.');return;}

  const curHash=await sha256(cur);
  const stored=getStoredHash();
  if(curHash!==stored){setMsg('현재 비밀번호가 틀렸어요.');return;}

  const newHash=await sha256(nw);
  // Save to S so it persists via JSONBin
  S.pwHash=newHash;
  scheduleSave();
  // Also update session
  try{sessionStorage.setItem('tt_pw_hash',newHash);}catch(e){}
  document.getElementById('cfgPwCurrent').value='';
  document.getElementById('cfgPwNew').value='';
  document.getElementById('cfgPwConfirm').value='';
  setMsg('✓ 비밀번호가 변경됐어요.',true);
}
